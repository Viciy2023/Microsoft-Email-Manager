name: Sync Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-hf-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Space payload
        run: |
          rm -rf hf-space
          mkdir -p hf-space
          cp huggingface/Dockerfile hf-space/Dockerfile
          cp huggingface/README.md hf-space/README.md

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: DanielleNguyen/Microsoft-Email-Manager
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          subdirectory: hf-space
